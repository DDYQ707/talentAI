version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: talent-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: talent_ai_db
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7
    container_name: talent-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - ./redis/data:/data

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: talent-nacos
    restart: always
    environment:
      MODE: standalone
      # 砍掉 MySQL 依赖，使用轻量级内嵌数据库，实现秒级启动且不报错
    ports:
      - "8848:8848"
      - "9848:9848" # ⚠️ 核心修复：Nacos 2.x 必需的 gRPC 端口
      - "9849:9849" # ⚠️ 核心修复：Nacos 2.x 必需的 gRPC 端口

  minio:
    image: minio/minio
    container_name: talent-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"