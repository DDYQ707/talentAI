server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # 开启从注册中心动态创建路由的功能
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # 认证中心路由
        - id: auth_route
          uri: lb://talent-auth
          predicates:
            - Path=/api/auth/**
        # 岗位与投递路由
        - id: job_route
          uri: lb://talent-job
          predicates:
            - Path=/api/job/**, /api/delivery/**, /api/jobApplication/**
        # Offer 路由（Controller 映射 /offer，网关 StripPrefix 剥离 /api）
        - id: offer_route
          uri: lb://talent-job
          predicates:
            - Path=/api/offer/**
          filters:
            - StripPrefix=1
        # 简历底座路由
        - id: resume_route
          uri: lb://talent-resume
          predicates:
            - Path=/api/resume/**
        # AI 智能体对外路由
        - id: ai_route
          uri: lb://talent-ai-agent
          predicates:
            - Path=/api/ai/**
        # AI 智能体服务间内部路由
        - id: ai_internal_route
          uri: lb://talent-ai-agent
          predicates:
            - Path=/internal/ai/**
        # 面试管理路由
        - id: interview_route
          uri: lb://talent-interview
          predicates:
            - Path=/api/interview/**
        # 面试服务间内部路由
        - id: interview_internal_route
          uri: lb://talent-interview
          predicates:
            - Path=/internal/interview/**
        # 人才库路由（Controller 映射 /talent-pool，网关 StripPrefix 剥离 /api）
        - id: talent_pool_route
          uri: lb://talent-talent-pool
          predicates:
            - Path=/api/talent-pool/**
          filters:
            - StripPrefix=1
        # 数据聚合 / 驾驶舱
        - id: analytics_route
          uri: lb://talent-analytics
          predicates:
            - Path=/api/analytics/**
